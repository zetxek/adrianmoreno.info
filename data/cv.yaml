  title: "Engineering Leader"

summary: >
  VP-level engineering leader with 19 years scaling SaaS, fintech, e-commerce
  and mobile — most recently as VP of Technology at Worksome and VP of
  Engineering at SumUp (unicorn, ~3,000 FTE). Built and led multi-cultural
  distributed teams across Spain, the Netherlands and Denmark. Hands-on at
  exec level — 300+ incident responses across roles, agentic-development
  practice driven at Worksome — combined with strong business acumen and a
  record of breaking silos between engineering, product and go-to-market.

